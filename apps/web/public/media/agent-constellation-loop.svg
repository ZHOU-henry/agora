<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081122"/>
      <stop offset="1" stop-color="#040814"/>
    </linearGradient>
    <style>
      .copy{fill:#edf7ff;font-family:'Space Grotesk','IBM Plex Sans',sans-serif}
      .meta{fill:#7db4ff;font-size:15px;letter-spacing:.28em;text-transform:uppercase}
      .title{fill:#edf7ff;font-size:40px;font-weight:700}
      .small{fill:#97aec7;font-size:20px}
      .ring{stroke:#7db4ff;stroke-opacity:.16;stroke-width:2}
      .link{stroke:#6ce8ff;stroke-opacity:.34;stroke-width:2.5}
      .core{fill:#081526;stroke:#6ce8ff;stroke-opacity:.56;stroke-width:2}
      .card{fill:#0b1732;stroke:#7db4ff;stroke-opacity:.18;stroke-width:2}
      .accent{fill:#6ce8ff}
      .accentB{fill:#89ffa8}
      .accentC{fill:#8f7dff}
      .accentD{fill:#ffd76e}
    </style>
  </defs>
  <rect width="1200" height="900" rx="32" fill="url(#bg)"/>
  <text x="78" y="92" class="copy meta">Agent Constellation</text>
  <text x="78" y="146" class="copy title">Specialists orbit a shared execution core.</text>
  <text x="78" y="182" class="copy small">The launch cohort is visual, memorable, and legible enough to trigger imagination without drowning users in copy.</text>

  <g>
    <circle cx="600" cy="470" r="130" class="ring"/>
    <circle cx="600" cy="470" r="210" class="ring"/>
    <circle cx="600" cy="470" r="286" class="ring"/>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 600 470" to="360 600 470" dur="24s" repeatCount="indefinite"/>
    <circle cx="600" cy="184" r="14" class="accent"/>
    <circle cx="886" cy="470" r="14" class="accentB"/>
    <circle cx="600" cy="756" r="14" class="accentC"/>
    <circle cx="314" cy="470" r="14" class="accentD"/>
  </g>

  <g>
    <path class="link" d="M600 470L600 184"/>
    <path class="link" d="M600 470L886 470"/>
    <path class="link" d="M600 470L600 756"/>
    <path class="link" d="M600 470L314 470"/>
  </g>

  <circle cx="600" cy="470" r="74" class="core"/>
  <rect x="548" y="454" width="104" height="10" rx="5" fill="#16274a"/>
  <rect x="564" y="480" width="72" height="10" rx="5" fill="#16274a"/>

  <g>
    <rect x="460" y="90" width="280" height="86" rx="24" class="card"/>
    <text x="488" y="122" class="copy meta" style="font-size:14px">Athena // strategy</text>
    <rect x="488" y="142" width="190" height="10" rx="5" fill="#16274a"/>
  </g>
  <g>
    <rect x="914" y="430" width="214" height="86" rx="24" class="card"/>
    <text x="942" y="462" class="copy meta" style="font-size:14px">Hermes // research</text>
    <rect x="942" y="482" width="144" height="10" rx="5" fill="#16274a"/>
  </g>
  <g>
    <rect x="458" y="736" width="286" height="86" rx="24" class="card"/>
    <text x="486" y="768" class="copy meta" style="font-size:14px">Hephaestus // build</text>
    <rect x="486" y="788" width="170" height="10" rx="5" fill="#16274a"/>
  </g>
  <g>
    <rect x="74" y="430" width="214" height="86" rx="24" class="card"/>
    <text x="102" y="462" class="copy meta" style="font-size:14px">Themis // audit</text>
    <rect x="102" y="482" width="138" height="10" rx="5" fill="#16274a"/>
  </g>
</svg>
