<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061122"/>
      <stop offset="0.55" stop-color="#09152c"/>
      <stop offset="1" stop-color="#040814"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(302 224) rotate(24.4) scale(433 356)">
      <stop stop-color="#6CE8FF" stop-opacity=".4"/>
      <stop offset="1" stop-color="#6CE8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1310 672) rotate(160) scale(382 315)">
      <stop stop-color="#8F7DFF" stop-opacity=".35"/>
      <stop offset="1" stop-color="#8F7DFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .grid{stroke:#7db4ff;stroke-opacity:.12;stroke-width:1}
      .wire{stroke:#6ce8ff;stroke-opacity:.36;stroke-width:2;stroke-linecap:round}
      .wire-b{stroke:#89ffa8;stroke-opacity:.28;stroke-width:2;stroke-linecap:round}
      .node{fill:#08162e;stroke:#6ce8ff;stroke-opacity:.55;stroke-width:2}
      .pulse{fill:#6ce8ff}
      .chip{fill:#0c1732;stroke:#7db4ff;stroke-opacity:.18}
      .copy{fill:#dcecff;font-family:'Space Grotesk','IBM Plex Sans',sans-serif}
      .meta{fill:#7db4ff;font-size:20px;letter-spacing:.28em;text-transform:uppercase}
      .body{fill:#e9f5ff;font-size:54px;font-weight:700}
      .small{fill:#9ab4cf;font-size:24px}
      .screen{fill:#0b1630;stroke:#7db4ff;stroke-opacity:.22;stroke-width:2}
      .bar{fill:#6ce8ff;opacity:.9}
      .bar2{fill:#89ffa8;opacity:.88}
      .bar3{fill:#8f7dff;opacity:.85}
      .scan{fill:url(#scan)}
    </style>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#6CE8FF" stop-opacity="0"/>
      <stop offset=".45" stop-color="#6CE8FF" stop-opacity=".16"/>
      <stop offset=".62" stop-color="#89FFA8" stop-opacity=".08"/>
      <stop offset="1" stop-color="#6CE8FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#glowA)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#glowB)"/>

  <g opacity=".55">
    <path class="grid" d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600"/>
    <path class="grid" d="M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900"/>
  </g>

  <g>
    <text x="120" y="132" class="copy meta">Agora // Control Theater</text>
    <text x="120" y="212" class="copy body">Demand, builders, agents, review.</text>
    <text x="120" y="256" class="copy small">A cinematic loop for an AI agent platform that starts with a seeded cohort but scales to open supply.</text>
  </g>

  <g filter="url(#soft)" opacity=".35">
    <circle cx="834" cy="468" r="226" stroke="#6CE8FF" stroke-width="4"/>
    <circle cx="834" cy="468" r="290" stroke="#8F7DFF" stroke-width="3"/>
    <circle cx="834" cy="468" r="162" stroke="#89FFA8" stroke-width="2.5"/>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 834 468" to="360 834 468" dur="28s" repeatCount="indefinite"/>
    <circle cx="834" cy="242" r="14" class="pulse"/>
    <circle cx="1060" cy="468" r="12" fill="#89FFA8"/>
    <circle cx="834" cy="694" r="11" fill="#8F7DFF"/>
    <circle cx="608" cy="468" r="14" fill="#FFD76E"/>
  </g>

  <g>
    <path class="wire" d="M286 472C404 472 476 472 608 468"/>
    <path class="wire-b" d="M1060 468C1180 468 1248 468 1364 470"/>
    <path class="wire" d="M834 242C834 304 834 356 834 468"/>
    <path class="wire-b" d="M834 468C834 562 834 624 834 694"/>
  </g>

  <g>
    <rect x="120" y="388" width="166" height="170" rx="24" class="chip"/>
    <circle cx="170" cy="436" r="16" class="node"/>
    <rect x="200" y="424" width="56" height="10" rx="5" class="bar"/>
    <rect x="200" y="442" width="36" height="8" rx="4" class="bar3"/>
    <rect x="146" y="484" width="114" height="10" rx="5" fill="#1a2848"/>
    <rect x="146" y="506" width="88" height="10" rx="5" fill="#1a2848"/>
    <rect x="146" y="528" width="68" height="10" rx="5" fill="#1a2848"/>
    <text x="146" y="380" class="copy meta" style="font-size:16px">Customer brief</text>
  </g>

  <g>
    <rect x="690" y="382" width="288" height="172" rx="28" class="screen"/>
    <rect x="724" y="418" width="220" height="14" rx="7" fill="#132243"/>
    <rect x="724" y="448" width="174" height="12" rx="6" fill="#132243"/>
    <rect x="724" y="482" width="120" height="12" rx="6" fill="#132243"/>
    <rect x="724" y="514" width="198" height="14" rx="7" fill="#132243"/>
    <rect x="970" y="402" width="14" height="132" rx="7" fill="#132243"/>
    <rect x="970" y="442" width="14" height="48" rx="7" class="bar"/>
    <text x="708" y="372" class="copy meta" style="font-size:16px">Routing kernel</text>
  </g>

  <g>
    <rect x="1224" y="384" width="244" height="170" rx="24" class="chip"/>
    <text x="1252" y="420" class="copy meta" style="font-size:16px">Builder supply</text>
    <rect x="1252" y="450" width="186" height="16" rx="8" class="bar2"/>
    <rect x="1252" y="482" width="152" height="14" rx="7" class="bar"/>
    <rect x="1252" y="512" width="118" height="14" rx="7" class="bar3"/>
    <circle cx="1414" cy="438" r="7" fill="#89FFA8">
      <animate attributeName="r" values="7;10;7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="710" y="642" width="248" height="132" rx="24" class="chip"/>
    <text x="738" y="680" class="copy meta" style="font-size:16px">Review gate</text>
    <path d="M748 718l28 28 52-60" stroke="#89FFA8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="834" y="704" width="92" height="12" rx="6" fill="#132243"/>
    <rect x="834" y="730" width="70" height="12" rx="6" fill="#132243"/>
  </g>

  <rect x="0" y="-900" width="1600" height="900" fill="url(#scan)" opacity=".4">
    <animate attributeName="y" from="-900" to="900" dur="11s" repeatCount="indefinite"/>
  </rect>
</svg>
